<script>
  (function () {
    const openBtn = document.getElementById('cb-menu-open');
    const closeBtn = document.getElementById('cb-menu-close');
    const menu = document.getElementById('cb-mobile-menu');
    const header = document.getElementById('cb-header');
    function openMenu() {
      menu.classList.remove('hidden');
      menu.classList.add('flex');
      header?.classList.remove('cb-header-hidden');
      header?.classList.add('cb-menu-open');
      openBtn.setAttribute('aria-expanded', 'true');
      document.documentElement.style.overflow = 'hidden';
    }
    function closeMenu() {
      menu.classList.add('hidden');
      menu.classList.remove('flex');
      header?.classList.remove('cb-menu-open');
      openBtn.setAttribute('aria-expanded', 'false');
      document.documentElement.style.overflow = '';
      // reset all mobile accordions
      document.querySelectorAll('[id^="mob-dd-"]').forEach(el => {
        el.classList.add('hidden'); el.classList.remove('flex');
      });
      document.querySelectorAll('.mob-chev').forEach(c => c.style.transform = '');
    }
    openBtn?.addEventListener('click', openMenu);
    closeBtn?.addEventListener('click', closeMenu);
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeMenu(); });
  })();

  /* ── Mobile nav accordion ── */
  (function () {
    document.querySelectorAll('.mob-nav-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const dd = document.getElementById(btn.dataset.target);
        const chev = btn.querySelector('.mob-chev');
        if (!dd) return;
        const isOpen = !dd.classList.contains('hidden');
        // close all
        document.querySelectorAll('[id^="mob-dd-"]').forEach(el => {
          el.classList.add('hidden'); el.classList.remove('flex');
        });
        document.querySelectorAll('.mob-chev').forEach(c => c.style.transform = '');
        // toggle clicked
        if (!isOpen) {
          dd.classList.remove('hidden'); dd.classList.add('flex');
          if (chev) chev.style.transform = 'rotate(180deg)';
        }
      });
    });
  })();

  /* ── Nav dropdowns ── */
  (function () {
    const menus = [
      { btn: 'nav-products', dd: 'dd-products', chev: 'nav-products-chevron' },
      { btn: 'nav-services', dd: 'dd-services', chev: 'nav-services-chevron' },
      { btn: 'nav-support',  dd: 'dd-support',  chev: 'nav-support-chevron'  },
      { btn: 'nav-svc',      dd: 'dd-svc',      chev: 'nav-svc-chevron'      },
    ];
    function setActive(btn, active) {
      if (!btn) return;
      btn.style.color = active ? '#76BE29' : '';
    }
    function closeAll(except) {
      menus.forEach(m => {
        if (m.btn === except) return;
        const dd  = document.getElementById(m.dd);
        const ch  = document.getElementById(m.chev);
        const btn = document.getElementById(m.btn);
        if (dd) { dd.classList.add('hidden'); dd.classList.remove('flex'); }
        if (ch) ch.style.transform = '';
        setActive(btn, false);
      });
    }
    menus.forEach(m => {
      const btn = document.getElementById(m.btn);
      const dd  = document.getElementById(m.dd);
      const ch  = document.getElementById(m.chev);
      if (!btn || !dd) return;
      btn.addEventListener('click', e => {
        e.stopPropagation();
        const isOpen = !dd.classList.contains('hidden');
        closeAll(isOpen ? null : m.btn);
        if (isOpen) {
          dd.classList.add('hidden'); dd.classList.remove('flex');
          if (ch) ch.style.transform = '';
          setActive(btn, false);
        } else {
          dd.classList.remove('hidden'); dd.classList.add('flex');
          if (ch) ch.style.transform = 'rotate(180deg)';
          setActive(btn, true);
        }
      });
    });
    document.addEventListener('click', () => closeAll(null));
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeAll(null); });
  })();

  /* ── Desktop language switcher ── */
  (function () {
    const btn   = document.getElementById('nav-lang');
    const dd    = document.getElementById('dd-lang');
    const chev  = document.getElementById('nav-lang-chevron');
    const label = document.getElementById('lang-label-desk');
    const btnEN = document.getElementById('lang-en-desk');
    const btnVN = document.getElementById('lang-vn-desk');
    if (!btn || !dd) return;
    function closeDd() {
      dd.classList.add('hidden'); dd.classList.remove('flex');
      if (chev) chev.style.transform = '';
    }
    btn.addEventListener('click', e => {
      e.stopPropagation();
      const isOpen = !dd.classList.contains('hidden');
      if (isOpen) { closeDd(); } else {
        dd.classList.remove('hidden'); dd.classList.add('flex');
        if (chev) chev.style.transform = 'rotate(180deg)';
      }
    });
    function setLang(lang) {
      label.textContent = lang;
      btnEN.className = btnEN.className.replace(/text-\[#76BE29\]|text-black\/40/g, '');
      btnVN.className = btnVN.className.replace(/text-\[#76BE29\]|text-black\/40/g, '');
      if (lang === 'EN') {
        btnEN.classList.add('text-[#76BE29]'); btnVN.classList.add('text-black/40');
      } else {
        btnVN.classList.add('text-[#76BE29]'); btnEN.classList.add('text-black/40');
      }
      closeDd();
    }
    btnEN.addEventListener('click', e => { e.stopPropagation(); setLang('EN'); });
    btnVN.addEventListener('click', e => { e.stopPropagation(); setLang('VN'); });
    document.addEventListener('click', closeDd);
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeDd(); });
  })();

  /* ── Mobile language switcher ── */
  (function () {
    const btnEN = document.getElementById('lang-en-mob');
    const btnVN = document.getElementById('lang-vn-mob');
    function setLang(lang) {
      if (lang === 'EN') {
        btnEN.style.color = '#76BE29'; btnEN.style.opacity = '';
        btnVN.style.color = '#d6d6d6'; btnVN.style.opacity = '0.5';
      } else {
        btnVN.style.color = '#76BE29'; btnVN.style.opacity = '';
        btnEN.style.color = '#d6d6d6'; btnEN.style.opacity = '0.5';
      }
    }
    btnEN?.addEventListener('click', () => setLang('EN'));
    btnVN?.addEventListener('click', () => setLang('VN'));
  })();

  /* ── Search overlay ── */
  (function () {
    const overlay  = document.getElementById('cb-search-overlay');
    const closeBtn = document.getElementById('cb-search-close');
    const backdrop = document.getElementById('cb-search-backdrop');
    const input    = document.getElementById('cb-search-input');
    function openSearch() {
      overlay.classList.remove('hidden');
      document.documentElement.style.overflow = 'hidden';
      setTimeout(() => input?.focus(), 50);
    }
    function closeSearch() {
      overlay.classList.add('hidden');
      document.documentElement.style.overflow = '';
    }
    document.getElementById('cb-search-btn')?.addEventListener('click', openSearch);
    document.getElementById('cb-search-btn-mob')?.addEventListener('click', openSearch);
    closeBtn?.addEventListener('click', closeSearch);
    backdrop?.addEventListener('click', closeSearch);
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeSearch(); });
  })();
</script>

<header id="cb-header" class="sticky top-0 z-50 px-6 py-3">

  <!-- â”€â”€ DESKTOP â”€â”€ -->
  <div class="max-w-7xl mx-auto flex items-center gap-3">

    <!-- Main pill -->
    <nav class="bg-white flex flex-1 items-center h-[72px] pl-6 pr-3 py-1.5 rounded-[80px] shadow-[0px_0px_20px_0px_rgba(0,0,0,0.04)] overflow-hidden" aria-label="Main navigation">

      <!-- Logo -->
      <a href="#" aria-label="CyberBase home" class="shrink-0">
        <img src="icon/Logo.svg" alt="CyberBase" class="h-9 w-auto" />
      </a>

      <!-- Nav links -->
      <div class="hidden md:flex flex-1 items-center gap-5 px-6">
        <a href="#" class="flex items-center gap-1.5 text-sm font-semibold text-black whitespace-nowrap">
          Products &amp; Solutions
          <img src="icon/chevron-down.svg" class="opacity-50 w-3 h-3 shrink-0" alt=""/>
        </a>
        <a href="#" class="flex items-center gap-1.5 text-sm font-semibold text-black whitespace-nowrap">
          Services &amp; Domains
          <img src="icon/chevron-down.svg" class="opacity-50 w-3 h-3 shrink-0" alt=""/>
        </a>
        <a href="#" class="flex items-center gap-1.5 text-sm font-semibold text-black whitespace-nowrap">
          Support &amp; Contact
          <img src="icon/chevron-down.svg" class="opacity-50 w-3 h-3 shrink-0" alt=""/>
        </a>
      </div>

      <!-- Right actions -->
      <div class="flex items-center gap-2 shrink-0 ml-auto">

        <!-- Cart + Search (desktop) -->
        <div class="hidden md:flex items-center">
          <button aria-label="Cart" class="flex items-center justify-center w-14 h-12 rounded-lg">
            <img src="icon/cart.svg" class="w-4 h-4" alt=""/>
          </button>
          <div class="w-px h-3 bg-black opacity-10"></div>
          <button aria-label="Search" class="flex items-center justify-center w-14 h-12 rounded-lg">
            <img src="icon/search.svg" class="w-4 h-4" alt=""/>
          </button>
        </div>

        <!-- Service management button (desktop) -->
        <button class="hidden md:flex items-center gap-1.5 h-12 px-4 border border-black/20 rounded-[80px] text-sm font-semibold text-black whitespace-nowrap">
          <img src="icon/shield.svg" class="w-5 h-5 shrink-0" alt=""/>
          Service management
          <img src="icon/chevron-down.svg" class="opacity-50 w-3 h-3 shrink-0" alt=""/>
        </button>

        <!-- Hamburger (mobile) -->
        <button id="cb-menu-open" aria-label="Open menu" aria-expanded="false" aria-controls="cb-mobile-menu" class="md:hidden flex items-center justify-center w-12 h-12 rounded-lg">
          <img src="icon/menu.svg" class="w-5 h-5" alt=""/>
        </button>
      </div>
    </nav>

    <!-- Language pill (desktop) -->
    <div class="hidden md:flex bg-white items-center justify-center w-14 h-14 rounded-[80px] shadow-[0px_0px_20px_0px_rgba(0,0,0,0.04)] shrink-0">
      <button class="flex items-center gap-0.5 text-sm font-semibold text-black tracking-[1.4px] uppercase">
        EN
        <img src="icon/chevron-down.svg" class="opacity-50 w-3 h-3 shrink-0" alt=""/>
      </button>
    </div>
  </div>

  <!-- â”€â”€ MOBILE FULL-SCREEN MENU â”€â”€ -->
  <div id="cb-mobile-menu" class="fixed inset-0 bg-white z-50 hidden flex-col" role="dialog" aria-modal="true">
    <div class="flex items-center justify-between px-6 py-5 border-b border-gray-100">
      <a href="#" aria-label="CyberBase home">
        <img src="icon/Logo.svg" alt="CyberBase" class="h-8 w-auto" />
      </a>
      <button id="cb-menu-close" aria-label="Close menu" class="p-2 rounded-lg">
        <img src="icon/close.svg" class="w-6 h-6" alt=""/>
      </button>
    </div>
    <nav class="flex flex-col px-6 pt-4">
      <a href="#" class="flex items-center justify-between py-4 text-base font-semibold border-b border-gray-100">
        Products &amp; Solutions
        <img src="icon/chevron-down.svg" class="w-4 h-4 opacity-40" alt=""/>
      </a>
      <a href="#" class="flex items-center justify-between py-4 text-base font-semibold border-b border-gray-100">
        Services &amp; Domains
        <img src="icon/chevron-down.svg" class="w-4 h-4 opacity-40" alt=""/>
      </a>
      <a href="#" class="flex items-center justify-between py-4 text-base font-semibold border-b border-gray-100">
        Support &amp; Contact
        <img src="icon/chevron-down.svg" class="w-4 h-4 opacity-40" alt=""/>
      </a>
    </nav>
    <div class="px-6 pt-6 flex flex-col gap-3 mt-auto pb-8">
      <button class="flex items-center gap-2 h-12 px-5 border border-black/20 rounded-[80px] text-sm font-semibold text-black">
        <img src="icon/shield.svg" class="w-5 h-5 shrink-0" alt=""/>
        Service management
      </button>
      <button class="h-12 px-5 border border-black/20 rounded-[80px] text-sm font-semibold tracking-widest uppercase text-black">EN</button>
    </div>
  </div>
</header>

<script>
  (function () {
    const openBtn = document.getElementById('cb-menu-open');
    const closeBtn = document.getElementById('cb-menu-close');
    const menu = document.getElementById('cb-mobile-menu');
    function openMenu() {
      menu.classList.remove('hidden');
      menu.classList.add('flex');
      openBtn.setAttribute('aria-expanded', 'true');
      document.documentElement.style.overflow = 'hidden';
    }
    function closeMenu() {
      menu.classList.add('hidden');
      menu.classList.remove('flex');
      openBtn.setAttribute('aria-expanded', 'false');
      document.documentElement.style.overflow = '';
    }
    openBtn?.addEventListener('click', openMenu);
    closeBtn?.addEventListener('click', closeMenu);
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeMenu(); });
  })();
</script>

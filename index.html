<!doctype html>
<html lang="vi">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>CyberBase – Danh sách trang</title>
  <link rel="stylesheet" href="css/style.css"/>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: { extend: {
        colors: { primary: '#76BE29' },
        fontFamily: { sans: ['Wix Madefor Display','sans-serif'] }
      }}
    }
  </script>
</head>
<body class="bg-[#f9f5f3] antialiased min-h-screen flex flex-col items-center justify-center px-5 py-16">

  <div class="w-full max-w-[560px] flex flex-col gap-8">

    <!-- Header -->

    <!-- Link list -->
    <ul class="flex flex-col gap-3">

      <li>
        <a href="Homepage.html"

          <div class="flex flex-col gap-0.5">
            <span class="font-semibold text-[15px] group-hover:text-[#76BE29] transition-colors">Homepage</span>
            <span class="text-[12px] opacity-50">Homepage.html</span>
          </div>
          <div class="flex items-center justify-center size-9 border border-black/10 rounded-full group-hover:bg-[#76BE29] group-hover:border-[#76BE29] transition-all duration-200">
            <img src="icon/arrow-right.svg" class="w-4 h-4 group-hover:invert transition-all duration-200" alt=""/>

      <!-- Them trang moi vao day -->
